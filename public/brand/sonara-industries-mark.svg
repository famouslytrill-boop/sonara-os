<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">SONARA Prism Wave</title>
  <desc id="desc">Three original luminous ribbons converge into an open S-shaped wave, representing Forge, Canvas, and Signal moving through one connected system.</desc>
  <defs>
    <linearGradient id="violet" x1="35" y1="38" x2="203" y2="116" gradientUnits="userSpaceOnUse"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#4F6FFF"/></linearGradient>
    <linearGradient id="coral" x1="55" y1="87" x2="215" y2="170" gradientUnits="userSpaceOnUse"><stop stop-color="#FF4D8D"/><stop offset="1" stop-color="#FF8A3D"/></linearGradient>
    <linearGradient id="cyan" x1="37" y1="143" x2="202" y2="224" gradientUnits="userSpaceOnUse"><stop stop-color="#14C8E5"/><stop offset="1" stop-color="#20C98B"/></linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M193 61C169 34 123 28 84 45C52 59 39 82 51 103C63 124 93 126 128 126" stroke="url(#violet)" stroke-width="25"/>
    <path d="M128 126C162 126 194 129 205 151C216 174 198 199 166 213C130 228 87 221 63 194" stroke="url(#cyan)" stroke-width="25"/>
    <path d="M64 194C44 174 44 151 61 138C77 126 101 128 128 128C154 128 178 124 190 106C201 91 202 73 193 61" stroke="url(#coral)" stroke-width="12"/>
  </g>
  <circle cx="128" cy="127" r="9" fill="#F8FAFF" stroke="#11162A" stroke-width="4"/>
</svg>
