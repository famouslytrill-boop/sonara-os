services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sonara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-sonara_industries}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  worker:
    build:
      context: ./apps/api
    command: python -m app.workers.worker
    env_file: .env
    depends_on:
      - postgres
      - redis
  api:
    build:
      context: ./apps/api
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"
volumes:
  postgres_data:
