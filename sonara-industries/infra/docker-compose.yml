version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sonara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sonara}
      POSTGRES_USER: ${POSTGRES_USER:-sonara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sonara_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - sonara_postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sonara-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - sonara_qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: sonara-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - sonara_ollama_data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: sonara-open-webui
    restart: unless-stopped
    ports:
      - "3009:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - sonara_open_webui_data:/app/backend/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: sonara-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - sonara_mlflow_data:/mlflow

volumes:
  sonara_postgres_data:
  sonara_qdrant_data:
  sonara_ollama_data:
  sonara_open_webui_data:
  sonara_mlflow_data:
