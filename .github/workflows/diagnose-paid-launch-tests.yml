name: Diagnose paid launch tests

on:
  push:
    branches:
      - codex/finalize-paid-launch
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-diagnostics:
    if: github.event_name == 'push' || github.head_ref == 'codex/finalize-paid-launch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests and capture output
        shell: bash
        run: |
          set +e
          pnpm test > paid-launch-test-output.log 2>&1
          status=$?
          set -e
          cat paid-launch-test-output.log
          exit "$status"
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paid-launch-test-output-${{ github.run_attempt }}
          path: paid-launch-test-output.log
          if-no-files-found: error
          retention-days: 2
