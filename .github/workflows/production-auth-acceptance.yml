name: Production auth and tenant acceptance

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/production-auth-acceptance.yml

permissions:
  contents: read

concurrency:
  group: sonara-production-auth-acceptance
  cancel-in-progress: false

jobs:
  production-auth-acceptance:
    name: Signup, session, organization, and RLS acceptance
    if: github.head_ref == 'ops/production-auth-acceptance-20260722'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BASE_URL: https://sonaraindustries.com
      CLEANUP_ONLY: "true"
      EXPECTED_PROJECT_ID: yqncsonkxgwhcxedgevk
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Verify the approved production target
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          test "$SUPABASE_PROJECT_ID" = "$EXPECTED_PROJECT_ID"
          echo "Approved production project reference verified. Secret values were not printed."

      - name: Run temporary production acceptance accounts
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          const BASE_URL = required("BASE_URL").replace(/\/$/, "");
          const PROJECT_REF = required("SUPABASE_PROJECT_ID");
          const EXPECTED_PROJECT_REF = required("EXPECTED_PROJECT_ID");
          const MANAGEMENT_TOKEN = required("SUPABASE_ACCESS_TOKEN");
          const SUPABASE_URL = `https://${PROJECT_REF}.supabase.co`;
          const runSuffix = `${required("GITHUB_RUN_ID")}-${required("GITHUB_RUN_ATTEMPT")}`;
          const state = { serviceRole: "", anonKey: "", emails: [], users: [], organizations: [], signupBlocker: "" };

          function required(name) {
            const value = String(process.env[name] || "").trim();
            if (!value) throw new Error(`Missing required environment value: ${name}`);
            return value;
          }

          function assert(condition, message) {
            if (!condition) throw new Error(message);
          }

          async function jsonResponse(response, label) {
            const body = await response.text();
            if (!response.ok) throw new Error(`${label} failed with HTTP ${response.status}`);
            if (!body) return {};
            try {
              return JSON.parse(body);
            } catch {
              throw new Error(`${label} returned invalid JSON`);
            }
          }

          function adminHeaders(contentType = false) {
            const headers = {
              apikey: state.serviceRole,
              Authorization: `Bearer ${state.serviceRole}`
            };
            if (contentType) headers["Content-Type"] = "application/json";
            return headers;
          }

          function userHeaders(accessToken) {
            return {
              apikey: state.anonKey,
              Authorization: `Bearer ${accessToken}`,
              Accept: "application/json"
            };
          }

          function cookieFrom(response, name) {
            const lines = typeof response.headers.getSetCookie === "function"
              ? response.headers.getSetCookie()
              : [response.headers.get("set-cookie") || ""];
            const line = lines.find((value) => value.startsWith(`${name}=`));
            if (!line) return null;
            const pair = line.split(";", 1)[0];
            return {
              line,
              pair,
              value: decodeURIComponent(pair.slice(name.length + 1))
            };
          }

          function assertSecureCookie(cookie, label) {
            assert(cookie, `${label} cookie was not set`);
            assert(/;\s*HttpOnly/i.test(cookie.line), `${label} cookie is not HttpOnly`);
            assert(/;\s*Secure/i.test(cookie.line), `${label} cookie is not Secure`);
            assert(/;\s*SameSite=Lax/i.test(cookie.line), `${label} cookie is not SameSite=Lax`);
          }

          async function discoverProjectKeys() {
            assert(PROJECT_REF === EXPECTED_PROJECT_REF, "Refusing to test an unapproved Supabase project");
            const response = await fetch(`https://api.supabase.com/v1/projects/${PROJECT_REF}/api-keys`, {
              headers: { Authorization: `Bearer ${MANAGEMENT_TOKEN}` }
            });
            const payload = await jsonResponse(response, "Supabase API-key discovery");
            const keys = Array.isArray(payload) ? payload : (payload.keys || payload.data || []);
            const valueFor = (names) => {
              const row = keys.find((item) => names.includes(String(item.name || item.type || item.role || "").toLowerCase()));
              return String(row?.api_key || row?.key || row?.value || "").trim();
            };
            state.serviceRole = valueFor(["service_role", "secret"]);
            state.anonKey = valueFor(["anon", "publishable"]);
            assert(state.serviceRole, "Supabase service-role key was not available to the protected runner");
            assert(state.anonKey, "Supabase anonymous key was not available to the protected runner");
          }

          async function ensureProductionAuthEmail() {
            const configResponse = await fetch(`https://api.supabase.com/v1/projects/${PROJECT_REF}/config/auth`, {
              headers: { Authorization: `Bearer ${MANAGEMENT_TOKEN}` }
            });
            const config = await jsonResponse(configResponse, "Supabase Auth configuration read");
            const smtpHost = String(config.smtp_host || "").trim().toLowerCase();
            const smtpUser = String(config.smtp_user || "").trim();
            const customSmtpConfigured = Boolean(smtpHost && smtpUser && !smtpHost.includes("supabase"));
            if (customSmtpConfigured) {
              assert(config.mailer_autoconfirm === false, "Supabase Auth custom SMTP is configured but email confirmation is disabled");
              console.log("Supabase Auth custom SMTP and required email confirmation are already configured.");
              return true;
            }

            const resendKey = String(process.env.RESEND_API_KEY || "").trim();
            if (!resendKey) {
              state.signupBlocker = "Supabase Auth custom SMTP is missing and the Vercel-only Resend credential is unavailable to the protected runner";
              console.log("Public signup blocker confirmed: Supabase Auth custom SMTP is not configured.");
              return false;
            }
            const response = await fetch(`https://api.supabase.com/v1/projects/${PROJECT_REF}/config/auth`, {
              method: "PATCH",
              headers: {
                Authorization: `Bearer ${MANAGEMENT_TOKEN}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                external_email_enabled: true,
                mailer_autoconfirm: false,
                mailer_secure_email_change_enabled: true,
                smtp_admin_email: "no-reply@sonaraindustries.com",
                smtp_host: "smtp.resend.com",
                smtp_port: 465,
                smtp_user: "resend",
                smtp_pass: resendKey,
                smtp_sender_name: "SONARA Industries"
              })
            });
            await jsonResponse(response, "Supabase Auth Resend SMTP configuration");
            console.log("Supabase Auth custom SMTP was configured with the approved Resend sender; credentials were not printed.");
            await new Promise((resolve) => setTimeout(resolve, 2000));
            return true;
          }

          async function listAdminUsers() {
            const users = [];
            for (let page = 1; page <= 20; page += 1) {
              const response = await fetch(`${SUPABASE_URL}/auth/v1/admin/users?page=${page}&per_page=100`, {
                headers: adminHeaders()
              });
              const payload = await jsonResponse(response, "Supabase admin user listing");
              const pageUsers = Array.isArray(payload) ? payload : (payload.users || []);
              users.push(...pageUsers);
              const lastPage = Number(payload.last_page || payload.lastPage || 0);
              if (pageUsers.length < 100 || (lastPage && page >= lastPage)) break;
            }
            return users;
          }

          async function waitForAdminUser(email) {
            for (let attempt = 0; attempt < 12; attempt += 1) {
              const user = (await listAdminUsers()).find((item) => String(item.email || "").toLowerCase() === email.toLowerCase());
              if (user) return user;
              await new Promise((resolve) => setTimeout(resolve, 500));
            }
            throw new Error("The signup account was not visible through Supabase Auth admin access");
          }

          async function confirmUser(user) {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/admin/users/${user.id}`, {
              method: "PUT",
              headers: adminHeaders(true),
              body: JSON.stringify({ email_confirm: true })
            });
            const payload = await jsonResponse(response, "Supabase email confirmation");
            const confirmed = payload.user || payload;
            assert(confirmed.email_confirmed_at || confirmed.confirmed_at, "Supabase did not record email confirmation");
            return confirmed;
          }

          async function createSecondaryUser(email, password) {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/admin/users`, {
              method: "POST",
              headers: adminHeaders(true),
              body: JSON.stringify({
                email,
                password,
                email_confirm: true,
                user_metadata: { source: "sonara_production_auth_acceptance" }
              })
            });
            const payload = await jsonResponse(response, "Secondary Supabase Auth user creation");
            const user = payload.user || payload;
            assert(user.id, "Secondary Supabase Auth user creation did not return an ID");
            state.users.push(user.id);
            return user;
          }

          async function createFallbackPrimaryUser(email, password) {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/admin/users`, {
              method: "POST",
              headers: adminHeaders(true),
              body: JSON.stringify({
                email,
                password,
                email_confirm: false,
                user_metadata: { source: "sonara_production_auth_acceptance_fallback" }
              })
            });
            const payload = await jsonResponse(response, "Fallback Supabase Auth user creation");
            const user = payload.user || payload;
            assert(user.id, "Fallback Supabase Auth user creation did not return an ID");
            state.users.push(user.id);
            assert(!user.email_confirmed_at && !user.confirmed_at, "Fallback account was unexpectedly confirmed before confirmation");
            return confirmUser(user);
          }

          async function verifyPasswordControls() {
            for (const path of ["/signup", "/login"]) {
              const response = await fetch(`${BASE_URL}${path}`);
              const html = await response.text();
              assert(response.status === 200, `${path} did not render successfully`);
              assert(html.includes("data-toggle-password"), `${path} is missing its password toggle control`);
              assert(html.includes("aria-label=\"Show password\""), `${path} is missing its accessible Show password action`);
            }
            const script = await fetch(`${BASE_URL}/sonara-nexus.js`);
            const javascript = await script.text();
            assert(script.status === 200, "Password-control JavaScript did not load");
            assert(javascript.includes("data-toggle-password"), "Password-control JavaScript is not wired to the live toggle controls");
          }

          async function signupThroughApplication(email, password) {
            const response = await fetch(`${BASE_URL}/auth/signup`, {
              method: "POST",
              redirect: "manual",
              headers: {
                Accept: "text/html",
                "Content-Type": "application/x-www-form-urlencoded"
              },
              body: new URLSearchParams({ email, password, confirmPassword: password })
            });
            if (response.status !== 303) {
              state.signupBlocker ||= `Live application signup returned HTTP ${response.status}`;
              return null;
            }
            const location = String(response.headers.get("location") || "");
            if (!location.includes("confirmation_required")) {
              state.signupBlocker ||= "Production signup did not require email confirmation";
              return null;
            }
            const user = await waitForAdminUser(email);
            state.users.push(user.id);
            assert(!user.email_confirmed_at && !user.confirmed_at, "Signup account was unexpectedly confirmed before confirmation");
            return confirmUser(user);
          }

          async function loginThroughApplication(email, password) {
            const response = await fetch(`${BASE_URL}/auth/login`, {
              method: "POST",
              redirect: "manual",
              headers: {
                Accept: "application/json",
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ email, password })
            });
            const payload = await jsonResponse(response, "Application login");
            assert(payload.ok === true && payload.code === "login_ready", "Application login did not return login_ready");
            const access = cookieFrom(response, "sonara_customer_session");
            const refresh = cookieFrom(response, "sonara_customer_refresh");
            assertSecureCookie(access, "Access session");
            assertSecureCookie(refresh, "Refresh session");
            return { access, refresh };
          }

          async function rotateSession(session) {
            const response = await fetch(`${BASE_URL}/dashboard`, {
              redirect: "manual",
              headers: {
                Accept: "text/html",
                Cookie: `sonara_customer_session=expired-acceptance-token; ${session.refresh.pair}`
              }
            });
            assert(response.status === 200, `Refresh-backed dashboard request returned HTTP ${response.status}`);
            const access = cookieFrom(response, "sonara_customer_session");
            const refresh = cookieFrom(response, "sonara_customer_refresh");
            assertSecureCookie(access, "Rotated access session");
            assertSecureCookie(refresh, "Rotated refresh session");
            assert(access.value !== session.access.value, "Access session was not rotated");
            assert(refresh.value !== session.refresh.value, "Refresh session was not rotated");
            return { access, refresh };
          }

          async function createOrganization(session, name) {
            const response = await fetch(`${BASE_URL}/account/setup/organization`, {
              method: "POST",
              redirect: "manual",
              headers: {
                Accept: "application/json",
                "Content-Type": "application/json",
                Cookie: `${session.access.pair}; ${session.refresh.pair}`
              },
              body: JSON.stringify({ organizationName: name, productPath: "dashboard" })
            });
            const payload = await jsonResponse(response, "Application organization creation");
            assert(payload.ok === true && payload.code === "organization_created", "Application did not create the temporary organization");
            assert(payload.organizationId, "Application organization creation did not return an ID");
            state.organizations.push(payload.organizationId);
            return payload.organizationId;
          }

          async function serviceRows(table, query) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
              headers: { ...adminHeaders(), Accept: "application/json" }
            });
            const payload = await jsonResponse(response, `Service-role read of ${table}`);
            assert(Array.isArray(payload), `${table} did not return a row array`);
            return payload;
          }

          async function verifyOrganizationRecords(userId, organizationId) {
            const profiles = await serviceRows("profiles", `select=id&id=eq.${encodeURIComponent(userId)}`);
            const organizations = await serviceRows("organizations", `select=id&id=eq.${encodeURIComponent(organizationId)}`);
            const memberships = await serviceRows(
              "organization_memberships",
              `select=organization_id,user_id,role,status&organization_id=eq.${encodeURIComponent(organizationId)}&user_id=eq.${encodeURIComponent(userId)}`
            );
            assert(profiles.length === 1, "Organization setup did not create the expected profile row");
            assert(organizations.length === 1, "Organization setup did not create the expected organization row");
            assert(memberships.length === 1, "Organization setup did not create the expected membership row");
            assert(memberships[0].role === "owner" && memberships[0].status === "active", "Organization membership is not an active owner membership");
          }

          async function userOrganizationRows(accessToken, organizationId) {
            const response = await fetch(
              `${SUPABASE_URL}/rest/v1/organizations?select=id&id=eq.${encodeURIComponent(organizationId)}`,
              { headers: userHeaders(accessToken) }
            );
            const payload = await jsonResponse(response, "Authenticated organization RLS read");
            assert(Array.isArray(payload), "Authenticated organization RLS read did not return an array");
            return payload;
          }

          async function verifyCrossTenantDenial(sessionA, organizationA, organizationB) {
            const ownRows = await userOrganizationRows(sessionA.access.value, organizationA);
            const foreignRows = await userOrganizationRows(sessionA.access.value, organizationB);
            assert(ownRows.length === 1 && ownRows[0].id === organizationA, "Tenant A could not read its own organization");
            assert(foreignRows.length === 0, "RLS exposed tenant B to tenant A");
          }

          async function logoutThroughApplication(session) {
            const response = await fetch(`${BASE_URL}/auth/logout`, {
              method: "POST",
              redirect: "manual",
              headers: {
                Accept: "application/json",
                Cookie: `${session.access.pair}; ${session.refresh.pair}`
              }
            });
            const payload = await jsonResponse(response, "Application logout");
            assert(payload.ok === true, "Application logout did not succeed");
            const clearedAccess = cookieFrom(response, "sonara_customer_session");
            const clearedRefresh = cookieFrom(response, "sonara_customer_refresh");
            assert(clearedAccess && /Expires=Thu, 01 Jan 1970/i.test(clearedAccess.line), "Logout did not expire the access cookie");
            assert(clearedRefresh && /Expires=Thu, 01 Jan 1970/i.test(clearedRefresh.line), "Logout did not expire the refresh cookie");

            const protectedResponse = await fetch(`${BASE_URL}/dashboard`, {
              redirect: "manual",
              headers: { Accept: "application/json" }
            });
            assert(protectedResponse.status === 401, "Protected dashboard remained available after logout");
          }

          async function serviceDelete(table, query) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
              method: "DELETE",
              headers: adminHeaders()
            });
            if (!response.ok && response.status !== 404) {
              throw new Error(`Cleanup of ${table} failed with HTTP ${response.status}`);
            }
          }

          async function cleanup() {
            const query = `
              do $sonara_auth_acceptance_cleanup$
              declare
                test_user_ids uuid[];
                test_organization_ids uuid[];
                target record;
              begin
                select coalesce(array_agg(id), array[]::uuid[])
                  into test_user_ids
                  from auth.users
                 where email like 'sonara-auth-acceptance-%@example.com';

                select coalesce(array_agg(id), array[]::uuid[])
                  into test_organization_ids
                  from public.organizations
                 where name like 'SONARA Auth Acceptance %';

                if cardinality(test_organization_ids) > 0 then
                  for target in
                    select child_namespace.nspname as schema_name,
                           child_table.relname as table_name,
                           child_column.attname as column_name
                      from pg_constraint foreign_key
                      join pg_class child_table
                        on child_table.oid = foreign_key.conrelid
                      join pg_namespace child_namespace
                        on child_namespace.oid = child_table.relnamespace
                      join pg_attribute child_column
                        on child_column.attrelid = foreign_key.conrelid
                       and child_column.attnum = foreign_key.conkey[1]
                     where foreign_key.contype = 'f'
                       and foreign_key.confrelid = 'public.organizations'::regclass
                       and array_length(foreign_key.conkey, 1) = 1
                       and child_namespace.nspname = 'public'
                  loop
                    execute format(
                      'delete from %I.%I where %I = any ($1)',
                      target.schema_name,
                      target.table_name,
                      target.column_name
                    ) using test_organization_ids;
                  end loop;

                  delete from public.organizations
                   where id = any (test_organization_ids);
                end if;

                if cardinality(test_user_ids) > 0 then
                  for target in
                    select child_namespace.nspname as schema_name,
                           child_table.relname as table_name,
                           child_column.attname as column_name
                      from pg_constraint foreign_key
                      join pg_class child_table
                        on child_table.oid = foreign_key.conrelid
                      join pg_namespace child_namespace
                        on child_namespace.oid = child_table.relnamespace
                      join pg_attribute child_column
                        on child_column.attrelid = foreign_key.conrelid
                       and child_column.attnum = foreign_key.conkey[1]
                     where foreign_key.contype = 'f'
                       and foreign_key.confrelid = 'auth.users'::regclass
                       and array_length(foreign_key.conkey, 1) = 1
                       and child_namespace.nspname = 'public'
                  loop
                    execute format(
                      'delete from %I.%I where %I = any ($1)',
                      target.schema_name,
                      target.table_name,
                      target.column_name
                    ) using test_user_ids;
                  end loop;

                  delete from auth.users
                   where id = any (test_user_ids);
                end if;

                if exists (
                  select 1 from auth.users
                   where email like 'sonara-auth-acceptance-%@example.com'
                ) then
                  raise exception 'temporary auth users remain after cleanup';
                end if;

                if exists (
                  select 1 from public.organizations
                   where name like 'SONARA Auth Acceptance %'
                ) then
                  raise exception 'temporary organizations remain after cleanup';
                end if;
              end
              $sonara_auth_acceptance_cleanup$;
            `;
            const response = await fetch(`https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query`, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${MANAGEMENT_TOKEN}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ query })
            });
            const responseBody = await response.text();
            if (!response.ok) {
              let detail = responseBody;
              try {
                const payload = JSON.parse(responseBody);
                detail = String(payload.message || payload.error || payload.msg || responseBody);
              } catch {}
              detail = detail.replace(/[^a-zA-Z0-9_ .,:()\-]/g, " ").replace(/\s+/g, " ").trim().slice(0, 600);
              throw new Error(`Transaction-scoped temporary-account cleanup failed with HTTP ${response.status}: ${detail || "no diagnostic detail"}`);
            }
          }

          async function main() {
            await discoverProjectKeys();
            if (String(process.env.CLEANUP_ONLY || "").toLowerCase() === "true") {
              await cleanup();
              console.log("Cleanup-only run passed; no temporary auth acceptance records remain.");
              return;
            }
            await ensureProductionAuthEmail();
            await verifyPasswordControls();

            const passwordA = `Sa!${crypto.randomBytes(24).toString("base64url")}`;
            const passwordB = `Sb!${crypto.randomBytes(24).toString("base64url")}`;
            const emailA = `sonara-auth-acceptance-${runSuffix}-a@example.com`;
            const emailB = `sonara-auth-acceptance-${runSuffix}-b@example.com`;
            state.emails.push(emailA, emailB);

            let failure;
            try {
              const signupUser = await signupThroughApplication(emailA, passwordA);
              const userA = signupUser || await createFallbackPrimaryUser(emailA, passwordA);
              const userB = await createSecondaryUser(emailB, passwordB);
              const loginA = await loginThroughApplication(emailA, passwordA);
              const loginB = await loginThroughApplication(emailB, passwordB);
              const sessionA = await rotateSession(loginA);
              const organizationA = await createOrganization(sessionA, `SONARA Auth Acceptance A ${runSuffix}`);
              const organizationB = await createOrganization(loginB, `SONARA Auth Acceptance B ${runSuffix}`);
              await verifyOrganizationRecords(userA.id, organizationA);
              await verifyOrganizationRecords(userB.id, organizationB);
              await verifyCrossTenantDenial(sessionA, organizationA, organizationB);
              await logoutThroughApplication(sessionA);
              await logoutThroughApplication(loginB);

            } catch (error) {
              failure = error;
            }

            try {
              await cleanup();
            } catch (cleanupError) {
              failure = failure
                ? new Error(`${failure.message}; ${cleanupError.message}`)
                : cleanupError;
            }

            if (failure) throw failure;
            fs.appendFileSync(required("GITHUB_STEP_SUMMARY"), [
              state.signupBlocker ? "### Production auth acceptance is blocked on public signup" : "### Production auth and tenant acceptance passed",
              state.signupBlocker
                ? `- Remaining blocker: ${state.signupBlocker}. Configure Resend as Supabase Auth custom SMTP, then rerun the live signup confirmation test.`
                : "- Live signup required confirmation and the temporary account reached a confirmed state.",
              state.signupBlocker
                ? "- A temporary admin-created account proved the unconfirmed-to-confirmed Auth state without using customer data."
                : "- The confirmation-required signup account was confirmed for the lifecycle test.",
              "- Live password login set Secure, HttpOnly, SameSite=Lax access and refresh cookies.",
              "- An invalid access token was renewed through the refresh cookie and both tokens rotated.",
              "- Both temporary organizations produced profile, organization, and active-owner membership rows.",
              "- Tenant A could read its own organization and received zero rows for tenant B through RLS.",
              "- Logout expired both cookies and the protected dashboard returned 401.",
              "- Temporary organizations and users were removed in the cleanup phase.",
              ""
            ].join("\n"));
            if (state.signupBlocker) {
              throw new Error(`Remaining production signup blocker: ${state.signupBlocker}. All downstream login, refresh, organization, RLS, logout, and cleanup checks passed.`);
            }
            console.log("Production auth and cross-tenant acceptance passed; temporary data was removed.");
          }

          main().catch((error) => {
            console.error(`Acceptance failure: ${error.message}`);
            process.exitCode = 1;
          });
          NODE
