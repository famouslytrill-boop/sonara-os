name: Reconcile SONARA cinematic v4

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sonara-cinematic-v4-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/sonara-cinematic-research-v2
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reconcile source and test contracts
        run: node .ai/apply-cinematic-v4.cjs

      - name: Generate runtime twice and capture idempotency evidence
        id: runtime
        shell: bash
        run: |
          set -euo pipefail
          pnpm run apply:runtime
          git diff --binary > /tmp/runtime-first.diff
          cp server.js /tmp/server-first.js
          cp public/sonara-application-ui.css /tmp/styles-first.css
          cp public/sonara-nexus.js /tmp/nexus-first.js
          pnpm run apply:runtime
          git diff --binary > /tmp/runtime-second.diff
          diff -u /tmp/runtime-first.diff /tmp/runtime-second.diff > /tmp/runtime-idempotency.diff || true
          if cmp -s /tmp/runtime-first.diff /tmp/runtime-second.diff; then
            echo "idempotent=true" >> "$GITHUB_OUTPUT"
          else
            echo "idempotent=false" >> "$GITHUB_OUTPUT"
          fi
          git diff --check

      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cinematic-v4-runtime-diagnostics
          path: |
            /tmp/runtime-first.diff
            /tmp/runtime-second.diff
            /tmp/runtime-idempotency.diff
            /tmp/server-first.js
            /tmp/styles-first.css
            /tmp/nexus-first.js
          if-no-files-found: error
          retention-days: 3

      - name: Commit reconciled runtime for shared CI
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: generate SONARA cinematic v4 runtime"
          git push origin HEAD:feat/sonara-cinematic-research-v2

      - name: Run tests
        run: pnpm exec mocha --file tests/setup-env.cjs "tests/**/*.js" --pass-with-no-tests

      - name: Build and lint
        run: |
          pnpm run build
          pnpm run lint
          pnpm run typecheck

      - name: Security and contract checks
        run: |
          pnpm run scan:client-secrets
          pnpm run smoke:routes
          pnpm run verify:config
          pnpm run verify:api

      - name: Build Docker image
        run: docker build -t sonara-os:cinematic-v4 .

      - name: Enforce runtime idempotency
        if: steps.runtime.outputs.idempotent != 'true'
        run: |
          echo "Runtime generation changed between the first and second pass. Review cinematic-v4-runtime-diagnostics."
          exit 1

      - name: Remove temporary reconciliation files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .ai/apply-cinematic-v4.cjs
          rm -f .github/workflows/cinematic-v4-reconcile.yml
          git add -A
          git commit -m "chore: remove cinematic reconciliation helpers"
          git push origin HEAD:feat/sonara-cinematic-research-v2
