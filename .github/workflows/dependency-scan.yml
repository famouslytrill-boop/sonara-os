name: dependency-scan

on:
  push:
  pull_request:

jobs:
  frontend-dependencies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit root dependencies
        run: pnpm audit --audit-level moderate

      - name: Validate open-source dependency and repository policy
        run: pnpm run verify:open-source

      - name: Typecheck root app
        run: pnpm run typecheck

      - name: Build root app
        run: pnpm run build

  backend-dependencies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Verify installed Python dependency compatibility
        run: python -m pip check
      - name: Audit pinned Python dependencies
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt
      - name: Compile and import the FastAPI backend
        run: |
          python -m py_compile main.py app/main.py
          python -c 'from app.main import app; paths = {route.path for route in app.routes}; assert "/health" in paths and "/brands" in paths'
