name: Apply Reference Intelligence Migrations

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-reference-intelligence-migrations.yml

permissions:
  contents: read
  issues: write

concurrency:
  group: sonara-production-database-migrations
  cancel-in-progress: false

jobs:
  apply-production-migrations:
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      GH_TOKEN: ${{ github.token }}
      TRACKING_ISSUE: "59"
      MIGRATION_ONE: "20260722201500"
      MIGRATION_TWO: "20260722201600"

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_ID SUPABASE_DB_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Required protected variable $name is missing."
              exit 1
            fi
          done
          test -f "supabase/migrations/${MIGRATION_ONE}_reference_intelligence_system.sql"
          test -f "supabase/migrations/${MIGRATION_TWO}_extend_database_contract_reference_intelligence.sql"

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Link production project
        shell: bash
        run: |
          set -euo pipefail
          supabase link \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Dry-run production migration push
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked | tee migration-before.txt
          supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD" | tee migration-dry-run.txt

      - name: Apply pending production migrations
        shell: bash
        run: |
          set -euo pipefail
          pnpm run db:push

      - name: Verify remote migration history and repository contract
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked | tee migration-after.txt
          perl -pe 's/\e\[[0-9;?]*[A-Za-z]//g' migration-after.txt > migration-after-clean.txt

          for version in "$MIGRATION_ONE" "$MIGRATION_TWO"; do
            occurrences="$(awk -v version="$version" '{ total += gsub(version, version) } END { print total + 0 }' migration-after-clean.txt)"
            if [ "$occurrences" -lt 2 ]; then
              echo "Migration $version was not present in both local and remote history."
              cat migration-after-clean.txt
              exit 1
            fi
          done

          pnpm run verify:db

          {
            echo "### Production migration verification"
            echo
            echo "- ${MIGRATION_ONE}: present in local and remote migration history"
            echo "- ${MIGRATION_TWO}: present in local and remote migration history"
            echo "- Repository database contract: verified"
            echo "- Target branch: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report success to tracking issue
        if: success()
        shell: bash
        run: |
          gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" --body "Production database migration completed successfully.\n\n- \`${MIGRATION_ONE}_reference_intelligence_system.sql\`: present in local and remote migration history\n- \`${MIGRATION_TWO}_extend_database_contract_reference_intelligence.sql\`: present in local and remote migration history\n- \`pnpm run verify:db\`: passed\n- Commit: \`${GITHUB_SHA}\`"
          gh issue close "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed

      - name: Report failure to tracking issue
        if: failure()
        shell: bash
        run: |
          gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" --body "Production database migration workflow failed. No success claim has been recorded. Review GitHub Actions run \`${GITHUB_RUN_ID}\` before retrying."
