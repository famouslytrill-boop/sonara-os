name: Apply approved Supabase migrations

on:
  push:
    branches:
      - feat/governed-ai-integrations
    paths:
      - .github/workflows/apply-approved-supabase-migrations.yml
      - supabase/migrations/20260721170000_governed_ai_integration_catalog.sql
      - supabase/migrations/20260721213000_complete_runtime_database_contract.sql

permissions:
  contents: read

concurrency:
  group: sonara-production-database-migrations
  cancel-in-progress: false

jobs:
  apply-approved-migrations:
    name: Apply migrations 43-44
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      EXPECTED_PROJECT_ID: yqncsonkxgwhcxedgevk
    steps:
      - uses: actions/checkout@v5

      - name: Verify approved target and credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$SUPABASE_DB_PASSWORD"
          if [ "$SUPABASE_PROJECT_ID" != "$EXPECTED_PROJECT_ID" ]; then
            echo "Refusing migration: configured project does not match the approved SONARA production project."
            exit 1
          fi
          echo "Approved production project reference verified. Secret values were not printed."

      - name: Verify recoverable database backup
        id: backup
        shell: bash
        run: |
          set -euo pipefail
          backup_json="$RUNNER_TEMP/sonara-supabase-backups.json"
          curl --fail --silent --show-error --retry 2 \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/database/backups" \
            > "$backup_json"

          node - "$backup_json" <<'NODE'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));

          function walk(value, path = []) {
            if (!value || typeof value !== "object") return [];
            if (Array.isArray(value)) {
              return [{ path, value }, ...value.flatMap((item, index) => walk(item, [...path, String(index)]))];
            }
            return Object.entries(value).flatMap(([key, item]) => [
              { path: [...path, key], value: item },
              ...walk(item, [...path, key])
            ]);
          }

          const entries = walk(payload);
          const pitrEnabled = entries.some(({ path, value }) =>
            /pitr|point.?in.?time/i.test(path.join(".")) && value === true
          );
          const latestPhysicalBackup = entries.find(({ path, value }) =>
            path.at(-1) === "latest_physical_backup_date_unix" && Number(value) > 0
          );
          const backupArrays = entries
            .filter(({ path, value }) => Array.isArray(value) && (path.length === 0 || /backup|restore/i.test(path.join("."))))
            .flatMap(({ value }) => value)
            .filter((item) => item && typeof item === "object" && !Array.isArray(item));
          const recoverable = backupArrays.filter((item) => {
            const status = String(item.status || item.state || "").toLowerCase();
            if (/fail|error|cancel|expire|delete/.test(status)) return false;
            if (/complete|success|available|ready|finish/.test(status)) return true;
            return Boolean(item.inserted_at || item.created_at || item.updated_at || item.backup_date || item.completed_at);
          });

          const managed = pitrEnabled || Boolean(latestPhysicalBackup) || recoverable.length > 0;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `managed=${managed}\n`);
          if (pitrEnabled) console.log("Supabase PITR protection confirmed.");
          else if (latestPhysicalBackup) console.log("Supabase physical backup protection confirmed.");
          else if (recoverable.length > 0) console.log(`Supabase reported ${recoverable.length} recoverable database backup(s).`);
          else console.log("No managed backup was reported; an encrypted logical backup is required before migration.");
          NODE

          rm -f "$backup_json"

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Link approved project
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Create encrypted logical backup when managed protection is unavailable
        if: steps.backup.outputs.managed != 'true'
        id: logical-backup
        shell: bash
        run: |
          set -euo pipefail
          backup_dir="$RUNNER_TEMP/sonara-pre-migration-backup"
          archive_name="sonara-production-pre-migration-${GITHUB_RUN_ID}.tar.gz"
          plain_archive="$RUNNER_TEMP/$archive_name"
          encrypted_archive="$plain_archive.enc"
          checksum_file="$encrypted_archive.sha256"
          key_file="$RUNNER_TEMP/sonara-backup-key"

          mkdir -p "$backup_dir"
          supabase db dump --linked --role-only --file "$backup_dir/roles.sql"
          supabase db dump --linked --schema public,auth,storage --file "$backup_dir/schema.sql"
          supabase db dump --linked --schema public,auth,storage --data-only --use-copy --file "$backup_dir/data.sql"
          tar -C "$backup_dir" -czf "$plain_archive" roles.sql schema.sql data.sql

          umask 077
          printf '%s' "$SUPABASE_DB_PASSWORD" > "$key_file"
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 600000 -md sha256 \
            -in "$plain_archive" \
            -out "$encrypted_archive" \
            -pass "file:$key_file"
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 600000 -md sha256 \
            -in "$encrypted_archive" \
            -pass "file:$key_file" \
            | tar -tzf - > /dev/null
          (
            cd "$RUNNER_TEMP"
            sha256sum "$archive_name.enc" > "$archive_name.enc.sha256"
          )

          test -s "$encrypted_archive"
          test -s "$checksum_file"
          rm -f \
            "$backup_dir/roles.sql" \
            "$backup_dir/schema.sql" \
            "$backup_dir/data.sql" \
            "$plain_archive" \
            "$key_file"
          rmdir "$backup_dir"

          echo "archive=$encrypted_archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum_file" >> "$GITHUB_OUTPUT"
          echo "Encrypted logical backup created and verified; plaintext was removed."

      - name: Upload encrypted pre-migration backup
        if: steps.backup.outputs.managed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sonara-production-pre-migration-${{ github.run_id }}
          path: |
            ${{ steps.logical-backup.outputs.archive }}
            ${{ steps.logical-backup.outputs.checksum }}
          if-no-files-found: error
          retention-days: 3

      - name: Preflight migration history and dry run
        shell: bash
        env:
          MANAGED_BACKUP: ${{ steps.backup.outputs.managed }}
        run: |
          set -euo pipefail
          supabase migration list --linked > migration-ledger-before.log 2>&1

          baseline="$(grep '20260718193000' migration-ledger-before.log || true)"
          baseline_occurrences="$(printf '%s' "$baseline" | grep -o '20260718193000' | wc -l | tr -d ' ')"
          if [ "$baseline_occurrences" -lt 2 ]; then
            echo "Refusing migration: the approved production baseline is not present in the remote ledger."
            exit 1
          fi

          dry_run="$(supabase db push --linked --dry-run 2>&1)"
          printf '%s\n' "$dry_run" > migration-dry-run.log

          pending="$(printf '%s\n' "$dry_run" | grep -oE '20[0-9]{12}_[A-Za-z0-9_.-]+\.sql' | sort -u || true)"
          while IFS= read -r migration; do
            [ -z "$migration" ] && continue
            case "$migration" in
              20260721170000_governed_ai_integration_catalog.sql|20260721213000_complete_runtime_database_contract.sql)
                ;;
              *)
                echo "Refusing migration: unexpected pending file $migration"
                exit 1
                ;;
            esac
          done <<< "$pending"

          {
            echo "### Supabase production migration preflight"
            echo "Target project reference verified: \`$EXPECTED_PROJECT_ID\`."
            if [ "$MANAGED_BACKUP" = "true" ]; then
              echo "Recoverable managed backup or PITR protection verified through the Supabase Management API."
            else
              echo "Encrypted logical pre-migration backup created, integrity-checked, and uploaded with three-day retention."
            fi
            if [ -n "$pending" ]; then
              echo "Approved pending migrations:"
              printf '%s\n' "$pending" | sed 's/^/- `/' | sed 's/$/`/'
            else
              echo "No unapplied migration files were reported; postflight will verify the approved versions."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply approved migrations
        shell: bash
        run: |
          set +e
          supabase db push --linked > migration-apply.log 2>&1
          status=$?
          set -e
          cat migration-apply.log
          exit "$status"

      - name: Verify remote migration ledger
        shell: bash
        run: |
          set -euo pipefail
          ledger="$(supabase migration list --linked 2>&1)"
          printf '%s\n' "$ledger" | tee migration-ledger-after.log
          for version in 20260721170000 20260721213000; do
            line="$(printf '%s\n' "$ledger" | grep "$version" || true)"
            occurrences="$(printf '%s' "$line" | grep -o "$version" | wc -l | tr -d ' ')"
            if [ "$occurrences" -lt 2 ]; then
              echo "Remote migration ledger does not confirm $version as applied."
              exit 1
            fi
          done
          echo "Both approved migration versions are present locally and remotely." >> "$GITHUB_STEP_SUMMARY"

      - name: Lint linked production schema
        shell: bash
        run: |
          set -euo pipefail
          supabase db lint --linked --level error --fail-on error 2>&1 | tee migration-lint.log
          echo "Linked production schema lint passed at error level." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: approved-supabase-migration-diagnostics-${{ github.run_attempt }}
          path: |
            migration-ledger-before.log
            migration-dry-run.log
            migration-apply.log
            migration-ledger-after.log
            migration-lint.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Remove encrypted runner backup copy
        if: always() && steps.backup.outputs.managed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          archive_name="sonara-production-pre-migration-${GITHUB_RUN_ID}.tar.gz"
          rm -f \
            "$RUNNER_TEMP/$archive_name.enc" \
            "$RUNNER_TEMP/$archive_name.enc.sha256" \
            "$RUNNER_TEMP/$archive_name" \
            "$RUNNER_TEMP/sonara-backup-key" \
            "$RUNNER_TEMP/sonara-pre-migration-backup/roles.sql" \
            "$RUNNER_TEMP/sonara-pre-migration-backup/schema.sql" \
            "$RUNNER_TEMP/sonara-pre-migration-backup/data.sql"
          rmdir "$RUNNER_TEMP/sonara-pre-migration-backup" 2>/dev/null || true
