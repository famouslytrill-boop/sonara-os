name: Apply approved Supabase migrations

on:
  push:
    branches:
      - codex/finalize-paid-launch
    paths:
      - .github/workflows/apply-approved-supabase-migrations.yml
      - supabase/migrations/20260718064853_data_api_privilege_hardening.sql
      - supabase/migrations/20260718071148_connect_database_contract.sql
      - supabase/migrations/20260718193000_operational_query_index_contract.sql

permissions:
  contents: read

concurrency:
  group: sonara-production-database-migrations
  cancel-in-progress: false

jobs:
  apply-approved-migrations:
    name: Apply migrations 40-42
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      EXPECTED_PROJECT_ID: yqncsonkxgwhcxedgevk
    steps:
      - uses: actions/checkout@v5

      - name: Verify approved target and credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$SUPABASE_DB_PASSWORD"
          if [ "$SUPABASE_PROJECT_ID" != "$EXPECTED_PROJECT_ID" ]; then
            echo "Refusing migration: configured project does not match the approved SONARA production project."
            exit 1
          fi
          echo "Approved project reference verified. Secret values were not printed."

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Link approved project
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Preflight migration history and dry run
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          echo "Current linked migration history:"
          supabase migration list --linked

          dry_run="$(supabase db push --linked --dry-run --include-all 2>&1)"
          printf '%s\n' "$dry_run"

          pending="$(printf '%s\n' "$dry_run" | grep -oE '20[0-9]{12}_[A-Za-z0-9_.-]+\.sql' | sort -u || true)"
          while IFS= read -r migration; do
            [ -z "$migration" ] && continue
            case "$migration" in
              20260718064853_data_api_privilege_hardening.sql|20260718071148_connect_database_contract.sql|20260718193000_operational_query_index_contract.sql)
                ;;
              *)
                echo "Refusing migration: unexpected pending file $migration"
                exit 1
                ;;
            esac
          done <<< "$pending"

          {
            echo "### Supabase migration preflight"
            if [ -n "$pending" ]; then
              echo "Approved pending migrations:"
              printf '%s\n' "$pending" | sed 's/^/- `/' | sed 's/$/`/'
            else
              echo "No unapplied migration files were reported; postflight will verify the approved versions."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply approved migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --include-all

      - name: Verify remote migration ledger
        shell: bash
        run: |
          set -euo pipefail
          ledger="$(supabase migration list --linked 2>&1)"
          printf '%s\n' "$ledger"
          for version in 20260718064853 20260718071148 20260718193000; do
            line="$(printf '%s\n' "$ledger" | grep "$version" || true)"
            occurrences="$(printf '%s' "$line" | grep -o "$version" | wc -l | tr -d ' ')"
            if [ "$occurrences" -lt 2 ]; then
              echo "Remote migration ledger does not confirm $version as applied."
              exit 1
            fi
          done
          echo "All approved migration versions are present locally and remotely." >> "$GITHUB_STEP_SUMMARY"

      - name: Lint linked production schema
        shell: bash
        run: |
          set -euo pipefail
          supabase db lint --linked --level error --fail-on error
          echo "Linked production schema lint passed at error level." >> "$GITHUB_STEP_SUMMARY"
