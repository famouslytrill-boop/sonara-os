name: Reconcile uploaded SONARA patch

on:
  push:
    branches:
      - apply/sonara-nexus-a11y-port-clean
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reconcile-uploaded-sonara-patch
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: apply/sonara-nexus-a11y-port-clean
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.1.1 --activate

      - name: Reconcile overlapping hunks
        run: node .ai/resolve-sonara-patch-overlaps.cjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify runtime generation is idempotent
        shell: bash
        run: |
          set -euo pipefail
          pnpm run apply:runtime
          git diff --binary > /tmp/runtime-first.diff
          pnpm run apply:runtime
          git diff --binary > /tmp/runtime-second.diff
          cmp /tmp/runtime-first.diff /tmp/runtime-second.diff
          git diff --check

      - name: Run full launch verification
        run: pnpm run verify:launch

      - name: Commit reconciled patch
        shell: bash
        run: |
          set -euo pipefail
          rm -f .ai/resolve-sonara-patch-overlaps.cjs
          rm -f .github/workflows/reconcile-uploaded-sonara-patch.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: apply SONARA Nexus accessibility and vertical modules"
          git push origin HEAD:apply/sonara-nexus-a11y-port-clean
