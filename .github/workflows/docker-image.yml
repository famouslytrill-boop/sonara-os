name: Docker Image CI

on:
  push:
    branches: ["main", "cleanup/local-dev-ci-alignment"]
  pull_request:

jobs:
  # Optional Docker check. The production deployment path is Vercel, so this
  # workflow must not require Docker unless a root Dockerfile is intentionally added.
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found. Skipping Docker image build."
          fi

      - name: Build the Docker image
        if: steps.dockerfile.outputs.exists == 'true'
name: Docker Image CI

on:
  push:
    branches:
      - main
      - cleanup/local-dev-ci-alignment
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t sonara-os:ci .