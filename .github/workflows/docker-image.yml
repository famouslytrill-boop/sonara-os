name: Docker Image CI

on:
  push:
    branches: ["main", "feat/sonara-platform-redesign"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check for Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found. Skipping Docker image build."
          fi

      - name: Build the Docker image
        if: steps.dockerfile.outputs.exists == 'true'
        run: docker build -t sonara-os:ci .

      - name: Smoke test the built image
        if: steps.dockerfile.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --name sonara-os-ci --publish 3000:3000 sonara-os:ci
          cleanup() {
            docker logs sonara-os-ci || true
            docker rm --force sonara-os-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          ready=false
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/health > /tmp/sonara-health.json; then
              ready=true
              break
            fi
            sleep 1
          done
          test "$ready" = "true"
          grep --quiet '"ok":true' /tmp/sonara-health.json
          grep --quiet '"app":"sonara-industries"' /tmp/sonara-health.json

          curl --fail --silent --show-error http://127.0.0.1:3000/ > /tmp/sonara-home.html
          grep --quiet 'sonara-application-ui.css' /tmp/sonara-home.html
          grep --quiet 'sonara-prepaint.js' /tmp/sonara-home.html
          grep --quiet 'sonara-nexus.js' /tmp/sonara-home.html
          grep --quiet 'data-sonara-interface="live"' /tmp/sonara-home.html

          curl --fail --silent --show-error http://127.0.0.1:3000/sonara-application-ui.css > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/sonara-prepaint.js > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/sonara-nexus.js > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:3000/api/ecosystem/readiness > /tmp/ecosystem-readiness.json
          curl --fail --silent --show-error http://127.0.0.1:3000/api/formulas/readiness > /tmp/formula-readiness.json
          grep --quiet '"mode":"static"' /tmp/ecosystem-readiness.json
          grep --quiet '"mode":"static"' /tmp/formula-readiness.json
