name: SONARA Industries CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sonara-industries:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level moderate

      - run: pnpm run typecheck

      - run: pnpm run lint

      - name: Run tests
        shell: bash
        run: |
          set +e
          pnpm test > test-output.log 2>&1
          status=$?
          cat test-output.log
          exit $status

      - name: Upload failed test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sonara-test-output
          path: test-output.log
          if-no-files-found: error
          retention-days: 3

      - run: pnpm run build

  supabase-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check Supabase preview secrets
        id: supabase-secrets
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Supabase preview skipped because required Supabase secrets are not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "Supabase preview secrets are configured."

      - uses: supabase/setup-cli@v1
        if: steps.supabase-secrets.outputs.configured == 'true'
        with:
          version: 2.109.1

      - name: Validate Supabase CLI and migrations
        if: steps.supabase-secrets.outputs.configured == 'true'
        run: |
          supabase --version
          test -d supabase/migrations
