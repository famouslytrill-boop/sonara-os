name: Redeploy Growth Studio Public Positioning

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/redeploy-growth-studio-public.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: sonara-growth-public-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_tjHnRTtPAagk3RcaEte9SRla
      VERCEL_PROJECT_ID: prj_QN8mHacmlaJWSieVbjMFV5D7fmuY
      GH_TOKEN: ${{ github.token }}
      TRACKING_ISSUE: "78"
      PREVIOUS_COMMIT: "254b511c567fc12f79c82c27e27e04c2818f0891"
      APEX: "https://sonaraindustries.com"
      WWW: "https://www.sonaraindustries.com"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate source and protected deployment access
        shell: bash
        run: |
          set -euo pipefail
          test -n "${VERCEL_TOKEN:-}"
          test -f scripts/apply-growth-studio-public-positioning.cjs
          test -f tests/growth-studio-public-positioning.test.js
          test -f routes/growth-studio-control-routes.cjs
          test -f supabase/migrations/20260723120000_growth_studio_control_plane.sql

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Reconfirm validated Growth Studio route
        shell: bash
        run: |
          set -euo pipefail
          pnpm run apply:runtime
          pnpm exec mocha --file tests/setup-env.cjs tests/growth-studio-public-positioning.test.js
          pnpm run scan:client-secrets

      - name: Deploy current main source through Vercel production project
        shell: bash
        run: |
          set -euo pipefail
          deployment_url=$(pnpm dlx vercel@latest deploy --prod --force --yes --token="$VERCEL_TOKEN" \
            --meta githubCommitSha="$GITHUB_SHA" \
            --meta githubCommitRef="main" \
            --meta githubCommitMessage="Deploy validated Growth Studio public positioning" \
            2>&1 | tee vercel-deploy.log | grep -Eo 'https://[^[:space:]]+\.vercel\.app' | tail -n 1)
          test -n "$deployment_url"
          echo "DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Production deployment: $deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify aliases, public positioning, and protected routes
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            apex_status=$(curl -sS -o apex-health.json -w '%{http_code}' "$APEX/api/health" || true)
            www_status=$(curl -sS -o www-health.json -w '%{http_code}' "$WWW/api/health" || true)
            page_status=$(curl -sS -o growth-page.html -w '%{http_code}' "$APEX/growth-studio" || true)
            if [ "$apex_status" = "200" ] && [ "$www_status" = "200" ] && [ "$page_status" = "200" ]; then
              if grep -q 'Governed growth operating system for CRM' growth-page.html; then
                break
              fi
            fi
            sleep 10
          done

          test "$apex_status" = "200"
          test "$www_status" = "200"
          test "$page_status" = "200"

          node - <<'NODE'
          const fs = require('node:fs');
          for (const file of ['apex-health.json', 'www-health.json']) {
            const payload = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (!payload.ok) throw new Error(`${file} did not report ok`);
            if (payload.deployment?.commitSha === process.env.PREVIOUS_COMMIT) {
              throw new Error(`${file} still reports previous commit ${process.env.PREVIOUS_COMMIT}`);
            }
            if (payload.deployment?.branch !== 'main') throw new Error(`${file} is not serving main`);
          }
          const html = fs.readFileSync('growth-page.html', 'utf8');
          const required = [
            'Governed growth operating system for CRM',
            'Campaign Operations',
            'CRM &amp; Lead Pipeline',
            'Audience Segments &amp; Consent',
            'Provider &amp; Automation Readiness',
            'Touchpoints, Conversion &amp; Attribution',
            'href="/growth-studio/control-center"',
            'href="/growth-studio/segments"',
            'href="/growth-studio/attribution"',
            'href="/growth-studio/experiments"',
            'href="/growth-studio/providers"',
            'without pretending unapproved sends, posts, or ad mutations are live'
          ];
          for (const marker of required) if (!html.includes(marker)) throw new Error(`public Growth Studio marker missing: ${marker}`);
          const old = 'Growth workspace for campaign planning, lead follow-up, consent-safe checklists, automation readiness, and growth records.';
          if (html.includes(old)) throw new Error('old Growth Studio description is still served');
          NODE

          provider_status=$(curl -sS -o provider.json -w '%{http_code}' "$APEX/api/growth/providers" || true)
          control_status=$(curl -sS -o control.txt -w '%{http_code}' "$APEX/growth-studio/control-center" || true)
          case "$provider_status" in 401|402|403) ;; *) echo "Unexpected provider route status: $provider_status"; exit 1;; esac
          case "$control_status" in 200|302|303|401|402|403) ;; *) echo "Unexpected control-center status: $control_status"; exit 1;; esac

          {
            echo "### Growth Studio public production deployment"
            echo "- Deployment URL: ${DEPLOYMENT_URL}"
            echo "- Apex health: ${apex_status}"
            echo "- WWW health: ${www_status}"
            echo "- Public Growth Studio: updated"
            echo "- Provider route: ${provider_status}, protected"
            echo "- Control center: ${control_status}, present/protected"
            echo "- Source commit: ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record success
        if: success()
        shell: bash
        run: |
          gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" --body "Growth Studio public production deployment completed.\n\n- Deployment: \`${DEPLOYMENT_URL}\`\n- Apex and www aliases: HTTP 200\n- Public Growth Studio operating-system positioning: verified\n- Control center, segments, attribution, experiments, and providers links: verified\n- Old limited description: absent\n- Provider and control-center routes: deployed and authentication-protected\n- Source commit: \`${GITHUB_SHA}\`\n- External provider readiness remains credential-, OAuth-, audit-, approval-, and acceptance-test gated."
          gh issue close "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed

      - name: Record failure
        if: failure()
        shell: bash
        run: |
          {
            echo "Growth Studio public production deployment did not complete. No success claim was recorded."
            echo
            echo "Run: \`${GITHUB_RUN_ID}\`"
            if [ -f vercel-deploy.log ]; then
              echo
              echo '```text'
              tail -n 80 vercel-deploy.log | sed -E 's/(authorization|password|token|secret|apikey)[=:][^[:space:]]+/\1=[redacted]/Ig'
              echo '```'
            fi
          } > deployment-failure.md
          gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" --body-file deployment-failure.md
