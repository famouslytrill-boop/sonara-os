# Development compose file for the SONARA Express app.
# Usage: docker compose -f docker-compose.dev.yml up --build
# Environment values come from a local .env file (never committed).
services:
  sonara-os:
    build: .
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: "5000"
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
