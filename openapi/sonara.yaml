openapi: 3.1.0
info:
  title: SONARA One Runtime API
  version: 0.1.0
  summary: Canonical contract for the API surface registered by the production Express runtime.
  license:
    name: MIT
    identifier: MIT
  description: |
    This contract describes the current API without changing response shapes. JSON errors use
    `{ ok: false, code, message?, service?, missing? }`. Some browser form requests negotiate
    HTML redirects or confirmation pages; JSON clients should send `Accept: application/json`.
servers:
  - url: /
    description: Same-origin production runtime
security: []
tags:
  - name: Platform
    description: Health, readiness, support, and route inventory.
  - name: Billing
    description: Stripe checkout, portal, status, and signed webhook operations.
  - name: Administration
    description: Owner-only environment, database, storage, and operational summaries.
  - name: Business Builder
    description: Workspace offers, intake, records, employee invitations, and launch checklist.
  - name: Creator Studio
    description: Creator assets, offers, records, and music project operations.
  - name: Growth Studio
    description: Campaign, lead, record, and readiness operations.
  - name: Formulas
    description: Deterministic formula discovery, evaluation, and persisted results.
  - name: Ecosystem
    description: SONARA ecosystem manifest and data readiness.
  - name: Infrastructure
    description: Declared infrastructure manifest and readiness.
  - name: Operations
    description: Authenticated business, location, motion, and time-entry records.
  - name: Integrations
    description: Provider metadata and auditable integration jobs.
  - name: Sensory
    description: Opt-in sound and haptic configuration records.
paths:
  /api/health:
    get:
      operationId: getHealth
      tags: [Platform]
      summary: Return process and deployment health metadata.
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/readiness:
    get:
      operationId: getReadiness
      tags: [Platform]
      summary: Return non-secret service configuration readiness.
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/internal/ops/configure-supabase-auth-smtp-20260722:
    post:
      operationId: configureSupabaseAuthSmtpAcceptance20260722
      tags: [Administration]
      summary: Run the one-time preview-only Supabase Auth SMTP configuration and acceptance proof.
      description: This operation is unavailable outside the exact approved preview branch and is removed after the production acceptance run.
      security: [{ supabaseManagementToken: [] }]
      parameters:
        - in: header
          name: x-sonara-operation
          required: true
          schema: { type: string, const: configure-resend-smtp-and-prove-email-confirmation }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Operation is unavailable outside the exact approved preview deployment. }
        "502": { description: A sanitized configuration or acceptance step failed. }
        "503": { $ref: "#/components/responses/SetupRequired" }
  /api/support/status:
    get:
      operationId: getSupportStatus
      tags: [Platform]
      summary: Return the configured support channel state.
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/routes/public:
    get:
      operationId: getPublicRouteRegistry
      tags: [Platform]
      summary: Return the public route registry used by verification.
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/checkout/session:
    get:
      operationId: getCheckoutSessionMethodNotice
      tags: [Billing]
      summary: Explain that checkout session creation requires POST.
      responses:
        "405": { $ref: "#/components/responses/MethodNotAllowed" }
    post:
      operationId: createCheckoutSession
      tags: [Billing]
      summary: Create a Stripe Checkout session for an allowed plan.
      security: [{ bearerAuth: [] }]
      requestBody: { $ref: "#/components/requestBodies/JsonOrFormBody" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "303": { description: Browser form redirect to login or Stripe Checkout. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/SetupRequired" }
  /api/billing/create-checkout-session:
    post:
      operationId: createBillingCheckoutSession
      tags: [Billing]
      summary: Compatibility endpoint for creating a Stripe Checkout session.
