components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token resolved server-side and authorized by workspace role.
    supabaseManagementToken:
      type: http
      scheme: bearer
      description: Protected Supabase Management API token accepted only by the temporary exact-branch operation.
    stripeSignature:
      type: apiKey
      in: header
      name: Stripe-Signature
      description: Stripe webhook signature verified against the configured endpoint secret.
  requestBodies:
    JsonBody:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/JsonObject" }
    JsonOrFormBody:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/JsonObject" }
        application/x-www-form-urlencoded:
          schema: { $ref: "#/components/schemas/JsonObject" }
    StripeEvent:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    Success:
      description: "Operation-specific HTTP success object; readiness payloads may use ok=false to report an unavailable dependency without changing the HTTP result."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/SuccessResponse" }
    BadRequest:
      description: Request validation or signature verification failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: A valid customer session is required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: The authenticated principal lacks the required role or entitlement.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    SetupRequired:
      description: A required external service or persisted resource is not configured.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    MethodNotAllowed:
      description: The registered compatibility method is intentionally unavailable.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    SuccessResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [ok, code]
      properties:
        ok: { const: false }
        code: { type: string }
        message: { type: string }
        service: { type: string }
        missing:
          type: array
          items: { type: string }
      additionalProperties: true
